name: Atomic Payments CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare Prisma database
        run: npx prisma generate
        env:
          DATABASE_URL: file:./ci-generate.db

      - name: Build
        run: npm run build

      - name: Run observability contract tests
        run: npm run test:observability

      - name: Run provider adapter contract tests
        run: npm run test:providers

      - name: Run isolated core smoke test
        run: npm run smoke:core:isolated
