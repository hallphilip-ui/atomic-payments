name: Atomic Payments CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare Prisma database
        run: npx prisma generate
        env:
          DATABASE_URL: file:./ci-generate.db

      - name: Check Prisma schema variants
        run: npm run check:prisma

      - name: Build
        run: npm run build

      - name: Run observability contract tests
        run: npm run test:observability

      - name: Run operator auth contract tests
        run: npm run test:operator-auth

      - name: Run provider adapter contract tests
        run: npm run test:providers

      - name: Run sanctions screening contract tests
        run: npm run test:sanctions

      - name: Run platform connector contract tests
        run: npm run test:platform-connectors

      - name: Run transfer compliance contract tests
        run: npm run test:transfer-compliance

      - name: Run security regression tests (XSS + off-ramp auth)
        run: npm run test:security

      - name: Run isolated core smoke test
        run: npm run smoke:core:isolated

      # Generate an ephemeral operator key per run rather than committing a static,
      # guessable fixture value into the workflow (it's only used to exercise the
      # operator-auth path in the smoke test).
      - name: Generate ephemeral operator key
        run: echo "CI_OPERATOR_KEY=op_ci_$(openssl rand -hex 16)" >> "$GITHUB_ENV"

      - name: Run isolated operator-protected smoke test
        run: npm run smoke:core:isolated
        env:
          ATOMIC_OPERATOR_API_KEY: ${{ env.CI_OPERATOR_KEY }}
          ATOMIC_SMOKE_PORT: 3106
          ATOMIC_SMOKE_DB_FILE: smoke-operator-ci.db
