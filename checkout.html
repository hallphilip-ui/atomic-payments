<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atomic Payments UI</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center font-sans p-4">

  <div class="bg-slate-800 border border-slate-700 rounded-2xl shadow-2xl w-full max-w-md p-6 max-h-[90vh] overflow-y-auto transition-all duration-300">
    
    <div id="setup-view" class="space-y-4">
      <div class="text-center">
        <h2 class="text-2xl font-bold tracking-tight text-indigo-400">Atomic Gateway</h2>
        <p class="text-slate-400 text-sm mt-1">Provide a dynamic Payment Intent ID</p>
      </div>
      <div>
        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Intent ID</label>
        <input type="text" id="intent-id-input" placeholder="Paste your generated intent ID here..." 
               class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500 font-mono text-indigo-300">
      </div>
      <button onclick="loadIntent()" class="w-full bg-indigo-600 hover:bg-indigo-500 font-medium py-3 rounded-xl transition text-sm shadow-lg shadow-indigo-600/20">
        Launch Multi-Chain UI
      </button>
    </div>

    <div id="checkout-view" class="hidden space-y-6">
      <div class="flex justify-between items-center border-b border-slate-700 pb-4">
        <div>
          <p class="text-xs font-semibold uppercase tracking-wider text-slate-400">Amount Due</p>
          <h3 id="fiat-amount" class="text-3xl font-extrabold text-white mt-1">$120.00 USD</h3>
        </div>
        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-indigo-500/10 text-indigo-400 border border-indigo-500/20">
          ⚙️ 7 Rails Active
        </span>
      </div>

      <div id="chain-selector" class="space-y-2.5">
        <h4 class="text-sm font-semibold text-slate-300">Select asset payment method:</h4>
        
        <button onclick="selectChain('BITCOIN_ONCHAIN')" class="w-full flex items-center justify-between p-3.5 bg-slate-950/40 border border-slate-700/60 rounded-xl hover:border-amber-500/50 transition text-left group">
          <div class="flex items-center space-x-3">
            <div class="w-9 h-9 rounded-lg bg-amber-500/10 flex items-center justify-center font-bold text-amber-500 text-sm">BTC</div>
            <div>
              <p class="font-medium text-sm text-white group-hover:text-amber-400 transition">Bitcoin Layer 1</p>
            </div>
          </div>
          <span class="text-xs font-mono text-slate-500">BTC</span>
        </button>

        <button onclick="selectChain('ETHEREUM')" class="w-full flex items-center justify-between p-3.5 bg-slate-950/40 border border-slate-700/60 rounded-xl hover:border-blue-400/50 transition text-left group">
          <div class="flex items-center space-x-3">
            <div class="w-9 h-9 rounded-lg bg-blue-500/10 flex items-center justify-center font-bold text-blue-400 text-sm">ETH</div>
            <div>
              <p class="font-medium text-sm text-white group-hover:text-blue-400 transition">Ethereum Network</p>
            </div>
          </div>
          <span class="text-xs font-mono text-slate-500">ETH</span>
        </button>

        <button onclick="selectChain('BNB_CHAIN')" class="w-full flex items-center justify-between p-3.5 bg-slate-950/40 border border-slate-700/60 rounded-xl hover:border-yellow-500/50 transition text-left group">
          <div class="flex items-center space-x-3">
            <div class="w-9 h-9 rounded-lg bg-yellow-500/10 flex items-center justify-center font-bold text-yellow-500 text-sm">BNB</div>
            <div>
              <p class="font-medium text-sm text-white group-hover:text-yellow-400 transition">BNB Smart Chain</p>
            </div>
          </div>
          <span class="text-xs font-mono text-slate-500">BSC</span>
        </button>

        <button onclick="selectChain('SOLANA')" class="w-full flex items-center justify-between p-3.5 bg-slate-950/40 border border-slate-700/60 rounded-xl hover:border-purple-500/50 transition text-left group">
          <div class="flex items-center space-x-3">
            <div class="w-9 h-9 rounded-lg bg-purple-500/10 flex items-center justify-center font-bold text-purple-400 text-sm">SOL</div>
            <div>
              <p class="font-medium text-sm text-white group-hover:text-purple-400 transition">Solana High-Speed</p>
            </div>
          </div>
          <span class="text-xs font-mono text-slate-500">SOL</span>
        </button>

        <button onclick="selectChain('RIPPLE')" class="w-full flex items-center justify-between p-3.5 bg-slate-950/40 border border-slate-700/60 rounded-xl hover:border-sky-400/50 transition text-left group">
          <div class="flex items-center space-x-3">
            <div class="w-9 h-9 rounded-lg bg-sky-500/10 flex items-center justify-center font-bold text-sky-400 text-sm">XRP</div>
            <div>
              <p class="font-medium text-sm text-white group-hover:text-sky-400 transition">Ripple Ledger</p>
            </div>
          </div>
          <span class="text-xs font-mono text-slate-500">XRP</span>
        </button>

        <button onclick="selectChain('CARDANO')" class="w-full flex items-center justify-between p-3.5 bg-slate-950/40 border border-slate-700/60 rounded-xl hover:border-cyan-500/50 transition text-left group">
          <div class="flex items-center space-x-3">
            <div class="w-9 h-9 rounded-lg bg-cyan-500/10 flex items-center justify-center font-bold text-cyan-400 text-sm">ADA</div>
            <div>
              <p class="font-medium text-sm text-white group-hover:text-cyan-400 transition">Cardano Settlement</p>
            </div>
          </div>
          <span class="text-xs font-mono text-slate-500">ADA</span>
        </button>

        <button onclick="selectChain('DOGECOIN')" class="w-full flex items-center justify-between p-3.5 bg-slate-950/40 border border-slate-700/60 rounded-xl hover:border-orange-400/50 transition text-left group">
          <div class="flex items-center space-x-3">
            <div class="w-9 h-9 rounded-lg bg-orange-500/10 flex items-center justify-center font-bold text-orange-400 text-sm">DOGE</div>
            <div>
              <p class="font-medium text-sm text-white group-hover:text-orange-400 transition">Dogecoin Core</p>
            </div>
          </div>
          <span class="text-xs font-mono text-slate-500">DOGE</span>
        </button>
      </div>

      <div id="payment-instructions" class="hidden space-y-5">
        <div class="bg-slate-950 rounded-xl p-4 border border-slate-800 text-center space-y-2">
          <p class="text-xs font-medium text-slate-400">Total Required Remittance:</p>
          <h4 id="crypto-required" class="text-2xl font-mono font-bold text-emerald-400 tracking-tight">0.00</h4>
          <p id="oracle-rate" class="text-xs text-slate-500 font-medium">-</p>
        </div>

        <div class="flex justify-center">
          <div class="bg-white p-2.5 rounded-xl">
            <img id="qr-code-img" src="" alt="QR" class="w-36 h-36">
          </div>
        </div>

        <div class="space-y-1">
          <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400">Target Address</label>
          <div class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-xs font-mono text-indigo-300 break-all text-center" id="deposit-address">
            -
          </div>
        </div>

        <div class="flex items-center justify-center space-x-2 text-xs font-medium text-rose-400 bg-rose-500/10 border border-rose-500/20 py-2 rounded-xl">
          <span>Rate Lock Expiry Countdown: <strong id="countdown-timer" class="font-mono">15:00</strong></span>
        </div>
      </div>

    </div>
  </div>

  <script>
    const API_BASE = 'http://localhost:3005';
    let currentIntentId = '';
    let countdownInterval;

    function showView(viewId) {
      document.getElementById('setup-view').classList.add('hidden');
      document.getElementById('checkout-view').classList.add('hidden');
      document.getElementById(viewId).classList.remove('hidden');
    }

    function loadIntent() {
      const idInput = document.getElementById('intent-id-input').value.trim();
      if (!idInput) return alert('Provide an active intent ID context.');
      currentIntentId = idInput;
      showView('checkout-view');
    }

    async function selectChain(blockchainName) {
      try {
        const response = await fetch(`${API_BASE}/v1/payment_intents/${currentIntentId}/select_chain`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ chain: blockchainName })
        });
        
        const data = await response.json();
        if (data.error) return alert(data.error);

        document.getElementById('crypto-required').innerText = `${data.cryptoAmountRequired} ${blockchainName.split('_')[0]}`;
        document.getElementById('oracle-rate').innerText = `Live Price: ${data.liveMarketRate}`;
        document.getElementById('deposit-address').innerText = data.depositAddress;
        document.getElementById('qr-code-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&color=0f172a&data=${data.depositAddress}`;

        document.getElementById('chain-selector').classList.add('hidden');
        document.getElementById('payment-instructions').classList.remove('hidden');
        startTimer(new Date(data.expiresAt));
      } catch (err) {
        alert('Payment processing node connection error.');
      }
    }

    function startTimer(expiryDate) {
      clearInterval(countdownInterval);
      function update() {
        const now = new Date().getTime();
        const distance = expiryDate.getTime() - now;
        if (distance < 0) {
          document.getElementById('countdown-timer').innerText = "EXPIRED";
          clearInterval(countdownInterval);
          return;
        }
        const mins = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const secs = Math.floor((distance % (1000 * 60)) / 1000);
        document.getElementById('countdown-timer').innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
      }
      update();
      countdownInterval = setInterval(update, 1000);
    }
  </script>
</body>
</html>
