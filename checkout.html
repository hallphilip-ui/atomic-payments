<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pay — Atomic Pay</title>
<meta name="description" content="Pay this invoice with crypto — USDC and stablecoins, any wallet, non-custodial.">
<link rel="canonical" href="https://atomicpay.cloud/checkout">
<meta property="og:site_name" content="Atomic Pay">
<meta property="og:title" content="Crypto Checkout | Atomic Pay">
<meta property="og:description" content="Pay with crypto — non-custodial, settles straight to the merchant.">
<meta property="og:image" content="https://atomicpay.cloud/assets/atomic-og.png">
<style>
  :root { --ink:#14161c; --muted:#667085; --faint:#98a2b3; --line:#e9eaf2; --accent:#6d5cf5; --accent-soft:#efedff; --bg:#eef0f7; --surface:#fff; --live:#0a7d33; --live-soft:#e7f5ec; --pend:#8a5a00; --err:#c0392b; --mono:ui-monospace,Menlo,Consolas,monospace; }
  @media (prefers-color-scheme: dark) { :root { --ink:#e9ebf2; --muted:#9aa2b2; --faint:#6b7383; --line:#252a37; --accent:#8f81ff; --accent-soft:#211f3a; --bg:#0e1016; --surface:#161923; --live:#52c982; --live-soft:#14241b; --pend:#e0a83a; } }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; font-family:Inter,system-ui,-apple-system,sans-serif; color:var(--ink); background:var(--bg); display:flex; align-items:flex-start; justify-content:center; padding:clamp(16px,5vw,48px) 16px; }
  .card { width:100%; max-width:440px; background:var(--surface); border:1px solid var(--line); border-radius:20px; box-shadow:0 12px 44px rgba(20,22,28,.10); overflow:hidden; }
  .head { padding:20px 24px 0; display:flex; align-items:center; gap:9px; }
  .head img { width:26px; height:20px; } .head b { font-size:14px; } .head .tag { margin-left:auto; font-size:11px; color:var(--faint); font-weight:600; }
  .body { padding:18px 24px 26px; }
  .biz { font-size:13px; color:var(--muted); }
  .amt { font-size:40px; font-weight:800; letter-spacing:-.02em; margin:2px 0; }
  .desc { font-size:14px; color:var(--muted); }
  .ref { font-family:var(--mono); font-size:11.5px; color:var(--faint); margin-top:4px; }
  .lbl { font-size:12px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; color:var(--faint); margin:22px 0 10px; }
  .rail { display:flex; align-items:center; gap:12px; width:100%; text-align:left; border:1px solid var(--line); background:var(--surface); border-radius:13px; padding:13px 15px; margin-bottom:9px; cursor:pointer; font-family:inherit; color:var(--ink); }
  .rail:hover { border-color:var(--accent); }
  .rail .ic { width:30px; height:30px; border-radius:50%; background:var(--accent-soft); color:var(--accent); font-weight:800; font-size:11px; display:flex; align-items:center; justify-content:center; flex:0 0 auto; }
  .rail .t { font-weight:700; font-size:14.5px; } .rail .s { font-size:12px; color:var(--muted); }
  .rail .rec { margin-left:auto; font-size:10.5px; font-weight:700; color:var(--live); background:var(--live-soft); padding:3px 8px; border-radius:6px; }
  .rail .arw { color:var(--faint); margin-left:auto; }
  .rail .rec ~ .arw { margin-left:8px; }
  .qr { width:212px; height:212px; margin:14px auto 6px; background:#fff; border:1px solid var(--line); border-radius:14px; display:flex; align-items:center; justify-content:center; }
  .qr img { width:200px; height:200px; }
  .payamt { text-align:center; font-size:24px; font-weight:800; }
  .payamt .r { display:block; font-size:13px; color:var(--muted); font-weight:600; margin-bottom:2px; }
  .addr { display:flex; gap:8px; align-items:center; background:var(--bg); border:1px solid var(--line); border-radius:11px; padding:10px 12px; margin-top:12px; }
  .addr code { flex:1; min-width:0; font-family:var(--mono); font-size:12px; word-break:break-all; }
  .btn { font-family:inherit; font-weight:700; font-size:14px; border:1px solid var(--line); background:var(--surface); color:var(--ink); border-radius:11px; padding:11px 14px; cursor:pointer; text-decoration:none; text-align:center; display:inline-block; }
  .btn.sm { padding:7px 11px; font-size:12.5px; border-radius:9px; }
  .btn.pri { background:var(--accent); border-color:var(--accent); color:#fff; width:100%; padding:13px; margin-top:12px; }
  .status { display:flex; align-items:center; justify-content:center; gap:8px; margin-top:16px; font-weight:700; font-size:14px; color:var(--pend); text-align:center; }
  .status .spin { width:15px; height:15px; border:2px solid var(--line); border-top-color:var(--pend); border-radius:50%; animation:sp .8s linear infinite; flex:0 0 auto; }
  @keyframes sp { to { transform:rotate(360deg); } }
  .meta { display:flex; justify-content:space-between; font-size:12px; color:var(--faint); margin-top:12px; }
  .back { background:none; border:none; color:var(--accent); font-weight:600; font-size:13px; cursor:pointer; padding:0; margin-top:16px; font-family:inherit; }
  .success { text-align:center; padding:8px 0 4px; }
  .success .check { width:60px; height:60px; border-radius:50%; background:var(--live-soft); color:var(--live); font-size:32px; display:flex; align-items:center; justify-content:center; margin:6px auto 12px; }
  .success h2 { margin:0 0 4px; font-size:20px; } .success p { color:var(--muted); font-size:14px; margin:0; }
  .rc { margin:16px 0 4px; font-size:13.5px; } .rc .r { display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px solid var(--line); } .rc .k { color:var(--muted); }
  .center { text-align:center; color:var(--muted); font-size:14px; padding:40px 10px; }
  .errbox { background:#fdecea; border:1px solid #f5c6c0; color:var(--err); border-radius:12px; padding:12px 14px; font-size:13.5px; text-align:center; }
  @media (prefers-color-scheme: dark){ .errbox{ background:#2a1614; border-color:#4a2420; } }
  [hidden] { display:none !important; }
  .foot { text-align:center; font-size:11px; color:var(--faint); padding:0 0 16px; } .foot a { color:var(--faint); }
</style>

<div class="card">
  <div class="head"><img src="/assets/atomic-mark.png" alt="" onerror="this.style.display='none'"><b>Atomic Pay</b><span class="tag">🔒 Non-custodial</span></div>
  <div class="body">
    <div id="loading" class="center">Loading payment…</div>
    <div id="errorView" hidden><div class="errbox" id="errMsg">This payment link is invalid or has expired.</div></div>

    <div id="chooseView" hidden>
      <div class="biz" id="cBiz"></div>
      <div class="amt" id="cAmt"></div>
      <div class="desc" id="cDesc"></div>
      <div class="ref" id="cRef"></div>
      <div class="lbl">Pay with</div>
      <div id="railList"></div>
    </div>

    <div id="payView" hidden>
      <div style="text-align:center" class="biz" id="pBiz"></div>
      <div class="qr" id="qr">…</div>
      <div class="payamt"><span class="r" id="pRailName"></span><span id="pCryptoAmt"></span></div>
      <div class="addr"><code id="pAddr"></code><button class="btn sm" id="copyAddr">Copy</button></div>
      <a class="btn pri" id="openWallet">Open in wallet</a>
      <div class="status" id="payStatus"><span class="spin"></span> Waiting for payment…</div>
      <div class="meta"><span id="pExpiry"></span><span id="pFiat"></span></div>
      <button class="back" id="changeRail">← Pay with a different coin</button>
    </div>

    <div id="successView" hidden>
      <div class="success"><div class="check">✓</div><h2>Payment complete</h2><p id="sBiz"></p></div>
      <div class="rc" id="sReceipt"></div>
      <button class="btn" style="width:100%;margin-top:12px" onclick="window.print()">Save receipt (PDF)</button>
    </div>
  </div>
  <div class="foot">Secured by <a href="/" target="_blank" rel="noopener">Atomic Pay</a> · funds settle directly to the merchant</div>
</div>

<script>
(function () {
  var $ = function (id) { return document.getElementById(id); };
  var qs = new URLSearchParams(location.search);
  var ID = qs.get('intentId') || qs.get('id') || '';
  var SYM = { USD:'$', EUR:'€', GBP:'£' };
  // Only rails the payment watcher can auto-confirm today (EVM stablecoins).
  var RAILS = [
    { key:'USD_COIN_BASE', sym:'USDC', net:'Base', rec:true },
    { key:'USD_COIN_ETHEREUM', sym:'USDC', net:'Ethereum' },
    { key:'TETHER_ETHEREUM', sym:'USDT', net:'Ethereum' },
    { key:'PYUSD_ETHEREUM', sym:'PYUSD', net:'Ethereum' }
  ];
  var poll = null, countdown = null;
  function money(a, c) { return (SYM[c] || '') + Number(a).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + (SYM[c] ? '' : ' ' + c); }
  function view(id) { ['loading','errorView','chooseView','payView','successView'].forEach(function (v) { $(v).hidden = v !== id; }); }
  function fail(m) { clearInterval(poll); clearInterval(countdown); $('errMsg').textContent = m; view('errorView'); }

  async function getReceipt() {
    try { var r = await fetch('/v1/payment_intents/' + encodeURIComponent(ID) + '/receipt'); if (!r.ok) return null; var d = await r.json(); return d.receipt || null; }
    catch (e) { return null; }
  }

  async function boot() {
    if (!ID) return fail('No payment specified.');
    var rc = await getReceipt();
    if (!rc) return fail('This payment link is invalid or has expired.');
    if (rc.paid) return success(rc);
    $('cBiz').textContent = rc.businessName || 'Payment';
    $('cAmt').textContent = money(rc.amount, rc.currency);
    $('cDesc').textContent = rc.description || '';
    $('cRef').textContent = rc.reference ? 'Ref: ' + rc.reference : '';
    renderRails(rc); view('chooseView');
  }

  function renderRails(rc) {
    var list = $('railList'); list.innerHTML = '';
    RAILS.forEach(function (rail) {
      var b = document.createElement('button'); b.className = 'rail';
      b.innerHTML = '<span class="ic">' + rail.sym.slice(0, 2) + '</span>' +
        '<span><span class="t">' + rail.sym + '</span><br><span class="s">on ' + rail.net + '</span></span>' +
        (rail.rec ? '<span class="rec">Lowest fees</span>' : '') + '<span class="arw">›</span>';
      b.addEventListener('click', function () { selectRail(rail, rc); });
      list.appendChild(b);
    });
  }

  async function selectRail(rail, rc) {
    view('payView'); $('pBiz').textContent = rc.businessName || '';
    $('payStatus').innerHTML = '<span class="spin"></span> Setting up…'; $('qr').textContent = '…';
    var d;
    try { var r = await fetch('/v1/payment_intents/' + ID + '/select_chain', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ chain: rail.key }) }); d = await r.json(); if (!r.ok) throw new Error(d.error || 'Could not set up this payment.'); }
    catch (e) { $('payStatus').innerHTML = '<span style="color:var(--err)">' + (e.message || 'Setup failed.') + '</span>'; return; }
    $('pRailName').textContent = 'Send ' + rail.sym + ' on ' + rail.net;
    $('pCryptoAmt').textContent = d.cryptoAmountRequired + ' ' + rail.sym;
    $('pAddr').textContent = d.depositAddress;
    $('pFiat').textContent = '= ' + money(rc.amount, rc.currency);
    $('openWallet').href = d.web3PaymentUri || '#';
    $('payStatus').innerHTML = '<span class="spin"></span> Waiting for payment…'; $('payStatus').style.color = 'var(--pend)';
    makeQr(d.web3PaymentUri || d.depositAddress);
    startCountdown(d.expiresAt);
    clearInterval(poll);
    poll = setInterval(async function () { var x = await getReceipt(); if (x && x.paid) success(x); }, 4000);
  }

  async function makeQr(text) {
    try { var M = await import('/assets/vendor/esm/qrcode.mjs'); var u = await (M.toDataURL || M.default.toDataURL)(text, { width: 200, margin: 1, color: { dark: '#14161c', light: '#ffffff' } }); $('qr').innerHTML = '<img alt="Payment QR" src="' + u + '">'; }
    catch (e) { $('qr').innerHTML = '<span style="font-size:12px;color:var(--muted);padding:12px;text-align:center">Copy the address below to pay</span>'; }
  }

  function startCountdown(expiresAt) {
    clearInterval(countdown);
    var end = new Date(expiresAt).getTime();
    function tick() {
      var ms = end - Date.now();
      if (ms <= 0) { clearInterval(countdown); clearInterval(poll); $('pExpiry').textContent = 'Expired'; $('payStatus').innerHTML = '<span style="color:var(--err)">This payment window expired — refresh to retry.</span>'; return; }
      var totalS = Math.floor(ms / 1000), d = Math.floor(totalS / 86400), h = Math.floor((totalS % 86400) / 3600), m = Math.floor((totalS % 3600) / 60), s = totalS % 60;
      var txt = d > 0 ? d + 'd ' + h + 'h' : h > 0 ? h + 'h ' + m + 'm' : m + ':' + (s < 10 ? '0' : '') + s;
      $('pExpiry').textContent = 'Expires in ' + txt;
    }
    tick(); countdown = setInterval(tick, 1000);
  }

  function success(rc) {
    clearInterval(poll); clearInterval(countdown);
    $('sBiz').textContent = 'Paid to ' + (rc.businessName || 'merchant');
    $('sReceipt').innerHTML =
      '<div class="r"><span class="k">Amount</span><span><b>' + money(rc.amount, rc.currency) + '</b></span></div>' +
      (rc.reference ? '<div class="r"><span class="k">Reference</span><span>' + rc.reference + '</span></div>' : '') +
      (rc.description ? '<div class="r"><span class="k">For</span><span>' + rc.description + '</span></div>' : '') +
      (rc.asset ? '<div class="r"><span class="k">Paid in</span><span>' + String(rc.asset).replace(/_/g, ' ') + '</span></div>' : '') +
      (rc.txHash ? '<div class="r"><span class="k">Transaction</span><span style="font-family:var(--mono);font-size:11px">' + rc.txHash.slice(0, 10) + '…' + rc.txHash.slice(-6) + '</span></div>' : '') +
      '<div class="r"><span class="k">Date</span><span>' + new Date(rc.confirmedAt || rc.createdAt).toLocaleString() + '</span></div>';
    view('successView');
  }

  $('copyAddr').addEventListener('click', function () { var b = this; navigator.clipboard.writeText($('pAddr').textContent).catch(function(){}); b.textContent = 'Copied'; setTimeout(function () { b.textContent = 'Copy'; }, 1500); });
  $('changeRail').addEventListener('click', function () { clearInterval(poll); clearInterval(countdown); boot(); });

  boot();
})();
</script>
