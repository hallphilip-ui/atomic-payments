<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atomic Transfers</title>
  <link rel="icon" href="/assets/atomic-mark.png">
  <style>
    :root {
      --ink: #edf7ff;
      --muted: #8fa8bc;
      --line: rgba(128, 200, 235, 0.2);
      --paper: #07111b;
      --panel: rgba(11, 24, 36, 0.94);
      --panel-strong: #0e2233;
      --blue: #0697ff;
      --cyan: #19d2f2;
      --green: #39d98a;
      --amber: #f0a54a;
      --red: #f05b68;
      --violet: #9e7bff;
      --steel: #c9d7e4;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(rgba(25, 210, 242, 0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(25, 210, 242, 0.045) 1px, transparent 1px),
        linear-gradient(135deg, #06101a 0%, #0b1723 45%, #101219 100%);
      background-size: 34px 34px, 34px 34px, 100% 100%;
      color: var(--ink);
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }
    .topbar {
      height: 78px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 clamp(18px, 4vw, 48px);
      border-bottom: 1px solid rgba(25, 210, 242, 0.22);
      background: rgba(5, 13, 22, 0.9);
      position: sticky; top: 0; z-index: 10;
      backdrop-filter: blur(16px);
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand img { width: 66px; height: 52px; object-fit: contain; filter: drop-shadow(0 0 12px rgba(25, 210, 242, 0.36)); }
    .brand strong { display: block; font-size: 16px; line-height: 1.1; color: #fff; }
    .brand span { display: block; font-size: 12px; color: var(--muted); }
    .nav { display: flex; gap: 8px; flex-wrap: wrap; }
    .nav a {
      min-height: 34px; display: inline-flex; align-items: center; padding: 0 14px;
      border: 1px solid var(--line); border-radius: 999px; font-size: 13px; color: var(--steel);
      background: rgba(14, 34, 51, 0.8);
    }
    .nav a.active { border-color: var(--cyan); color: #fff; box-shadow: 0 0 0 1px rgba(25,210,242,0.3) inset; }
    .wrap { max-width: 1180px; margin: 0 auto; padding: clamp(20px, 4vw, 40px) clamp(16px, 4vw, 32px) 64px; }
    h1 { font-size: clamp(22px, 3vw, 30px); margin: 0 0 6px; color: #fff; }
    .sub { color: var(--muted); font-size: 14px; margin: 0 0 26px; }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 26px; }
    .stat { border: 1px solid var(--line); border-radius: 16px; background: var(--panel); padding: 16px 18px; }
    .stat .k { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
    .stat .v { font-size: 26px; font-weight: 600; color: #fff; margin-top: 6px; }
    .tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
    .tab {
      min-height: 38px; display: inline-flex; align-items: center; gap: 8px; padding: 0 16px;
      border: 1px solid var(--line); border-radius: 999px; background: rgba(14, 34, 51, 0.55);
      color: var(--steel); font-size: 14px; cursor: pointer; transition: 0.15s;
    }
    .tab:hover { border-color: rgba(25,210,242,0.5); }
    .tab.active { background: rgba(6, 151, 255, 0.16); border-color: var(--blue); color: #fff; }
    .tab .count { font-size: 12px; color: var(--muted); background: rgba(0,0,0,0.28); border-radius: 999px; padding: 1px 8px; }
    .tab.active .count { color: var(--cyan); }
    .panel { border: 1px solid var(--line); border-radius: 18px; background: var(--panel); overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.09em;
      color: var(--muted); font-weight: 600; padding: 14px 18px; border-bottom: 1px solid var(--line);
      background: rgba(5, 13, 22, 0.5); white-space: nowrap;
    }
    tbody td { padding: 15px 18px; border-bottom: 1px solid rgba(128,200,235,0.08); font-size: 14px; vertical-align: middle; }
    tbody tr:last-child td { border-bottom: 0; }
    tbody tr:hover { background: rgba(25, 210, 242, 0.04); }
    .route { display: flex; align-items: center; gap: 8px; white-space: nowrap; }
    .chip { font-size: 12px; padding: 3px 9px; border-radius: 8px; border: 1px solid var(--line); color: var(--steel); background: rgba(14,34,51,0.7); }
    .arrow { color: var(--cyan); font-size: 13px; }
    .amt { font-variant-numeric: tabular-nums; color: #fff; }
    .amt small { color: var(--muted); margin-left: 4px; font-size: 12px; }
    .prov { font-size: 12px; color: var(--violet); letter-spacing: 0.04em; }
    .addr { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12.5px; color: var(--muted); }
    .badge { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
    .badge::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
    .badge.complete { color: var(--green); background: rgba(57, 217, 138, 0.12); }
    .badge.pending { color: var(--amber); background: rgba(240, 165, 74, 0.12); }
    .badge.failed { color: var(--red); background: rgba(240, 91, 104, 0.12); }
    .age { color: var(--muted); font-size: 13px; white-space: nowrap; }
    .foot { display: flex; align-items: center; justify-content: space-between; padding: 16px 18px; gap: 12px; flex-wrap: wrap; }
    .pager { display: flex; align-items: center; gap: 10px; }
    .pager button {
      min-height: 36px; padding: 0 16px; border-radius: 10px; border: 1px solid var(--line);
      background: rgba(14, 34, 51, 0.7); color: var(--ink); font-size: 13px; cursor: pointer;
    }
    .pager button:disabled { opacity: 0.4; cursor: not-allowed; }
    .pager .pageinfo { color: var(--muted); font-size: 13px; }
    .empty, .loading { padding: 56px 20px; text-align: center; color: var(--muted); font-size: 15px; }
    .refresh { color: var(--muted); font-size: 12px; }
    @media (max-width: 720px) {
      .stats { grid-template-columns: 1fr; }
      .hide-sm { display: none; }
      thead th, tbody td { padding: 12px 12px; }
      /* Let the table scroll sideways instead of clipping amounts. */
      .panel { overflow-x: auto; }
      table { min-width: 520px; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/transfers">
      <img src="/assets/atomic-mark.png" alt="Atomic" onerror="this.style.display='none'">
      <span><strong>Atomic</strong><span>Payments &amp; Conversions</span></span>
    </a>
    <nav class="nav">
      <a href="/transfers" class="active">Transfers</a>
      <a href="/defi-swap">Swap</a>
      <a href="/checkout">Checkout</a>
    </nav>
  </header>

  <main class="wrap">
    <h1>Transfers</h1>
    <p class="sub">Every conversion routed through the Atomic network — settled only when a trade executes.</p>

    <div class="stats">
      <div class="stat"><div class="k">Total transfers</div><div class="v" id="stat-total">—</div></div>
      <div class="stat"><div class="k">Completed</div><div class="v" id="stat-complete">—</div></div>
      <div class="stat"><div class="k">In progress</div><div class="v" id="stat-pending">—</div></div>
    </div>

    <div class="tabs" id="tabs">
      <button class="tab" data-status="all">All <span class="count" id="c-all">0</span></button>
      <button class="tab" data-status="pending">Pending <span class="count" id="c-pending">0</span></button>
      <button class="tab" data-status="complete">Complete <span class="count" id="c-complete">0</span></button>
      <button class="tab" data-status="failed">Failed <span class="count" id="c-failed">0</span></button>
    </div>

    <div class="panel">
      <table>
        <thead>
          <tr>
            <th>Time</th>
            <th>Route</th>
            <th>Send</th>
            <th>Receive</th>
            <th class="hide-sm">Provider</th>
            <th>Status</th>
            <th class="hide-sm">Address</th>
          </tr>
        </thead>
        <tbody id="rows">
          <tr><td colspan="7" class="loading">Loading transfers…</td></tr>
        </tbody>
      </table>
      <div class="foot">
        <span class="refresh" id="refresh-note">Auto-refreshes every 15s</span>
        <div class="pager">
          <button id="prev">← Prev</button>
          <span class="pageinfo" id="pageinfo">Page 1</span>
          <button id="next">Next →</button>
        </div>
      </div>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(location.search);
    let status = params.get('status') || 'all';
    let page = Math.max(0, parseInt(params.get('page') || '0', 10) || 0);
    let totalPages = 1;
    let timer = null;

    const $ = (id) => document.getElementById(id);

    function relTime(iso) {
      const s = Math.max(0, Math.floor((Date.now() - new Date(iso).getTime()) / 1000));
      if (s < 60) return s + 's ago';
      const m = Math.floor(s / 60); if (m < 60) return m + 'm ago';
      const h = Math.floor(m / 60); if (h < 24) return h + 'h ago';
      const d = Math.floor(h / 24); return d + 'd ago';
    }
    function esc(v) { return String(v == null ? '' : v).replace(/[&<>"]/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c])); }

    function syncUrl() {
      const u = new URLSearchParams();
      u.set('status', status); u.set('page', String(page));
      history.replaceState(null, '', location.pathname + '?' + u.toString());
    }

    function renderTabs(counts) {
      $('c-all').textContent = counts.all;
      $('c-pending').textContent = counts.pending;
      $('c-complete').textContent = counts.complete;
      $('c-failed').textContent = counts.failed;
      document.querySelectorAll('.tab').forEach((t) => t.classList.toggle('active', t.dataset.status === status));
      $('stat-total').textContent = counts.all;
      $('stat-complete').textContent = counts.complete;
      $('stat-pending').textContent = counts.pending;
    }

    function renderRows(transfers) {
      if (!transfers.length) {
        $('rows').innerHTML = '<tr><td colspan="7" class="empty">No transfers yet for this filter. Conversions appear here the moment they route through Atomic.</td></tr>';
        return;
      }
      $('rows').innerHTML = transfers.map((t) => `
        <tr>
          <td class="age" title="${esc(t.createdAt)}">${relTime(t.createdAt)}</td>
          <td><div class="route"><span class="chip">${esc(t.from.chain)}</span><span class="arrow">→</span><span class="chip">${esc(t.to.chain)}</span></div></td>
          <td><span class="amt">${esc(t.from.amount)}<small>${esc(t.from.symbol)}</small></span></td>
          <td><span class="amt">${esc(t.to.amount)}<small>${esc(t.to.symbol)}</small></span></td>
          <td class="hide-sm"><span class="prov">${esc(t.provider)}</span></td>
          <td><span class="badge ${esc(t.statusGroup)}">${esc(t.status)}</span></td>
          <td class="hide-sm"><span class="addr">${esc(t.address || '—')}</span></td>
        </tr>`).join('');
    }

    async function load() {
      try {
        const res = await fetch(`/v1/transfers?status=${encodeURIComponent(status)}&page=${page}&pageSize=20`, { headers: { accept: 'application/json' } });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        totalPages = data.totalPages || 1;
        if (page >= totalPages) { page = Math.max(0, totalPages - 1); }
        renderTabs(data.statusCounts || { all: 0, pending: 0, complete: 0, failed: 0 });
        renderRows(data.transfers || []);
        $('pageinfo').textContent = `Page ${page + 1} of ${totalPages}`;
        $('prev').disabled = page <= 0;
        $('next').disabled = page >= totalPages - 1;
        syncUrl();
      } catch (e) {
        $('rows').innerHTML = `<tr><td colspan="7" class="empty">Could not load transfers (${esc(e.message)}). Retrying…</td></tr>`;
      }
    }

    function schedule() { clearInterval(timer); timer = setInterval(load, 15000); }

    document.querySelectorAll('.tab').forEach((t) => t.addEventListener('click', () => {
      status = t.dataset.status; page = 0; load(); schedule();
    }));
    $('prev').addEventListener('click', () => { if (page > 0) { page--; load(); schedule(); } });
    $('next').addEventListener('click', () => { if (page < totalPages - 1) { page++; load(); schedule(); } });

    load();
    schedule();
  </script>
</body>
</html>
